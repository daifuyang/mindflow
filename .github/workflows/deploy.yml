name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_KEY }}
          envs: ECS_PATH
          script: |
            set -e
            cd ${{ secrets.ECS_DEPLOY_PATH }}

            # Pull latest code
            git fetch origin
            git pull origin main

            # Stop existing PM2 process
            pm2 stop mindflow || true
            pm2 delete mindflow || true

            # Clean and install dependencies (npm needed due to pnpm bug on ECS)
            rm -rf node_modules package-lock.json
            npm install
            npx prisma generate
            npx next build

            # Start PM2
            pm2 start ecosystem.config.cjs
            pm2 save

            # Check status
            pm2 status
