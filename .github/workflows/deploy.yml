name: Deploy shuo.daifuyang.com

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-shuo
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "8.15.9"
  PM2_APP_NAME: shuo-web-prod
  APP_PORT: "18301"
  APP_HOST: 127.0.0.1

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Install dependencies
        run: NODE_ENV=development pnpm install --frozen-lockfile --prod=false

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/aliyun_deploy_key
          chmod 600 ~/.ssh/aliyun_deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to server
        env:
          SSH_USER: ${{ secrets.ALIYUN_USER }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH || '/home/dfy/workspace/projects/websites/mindflow' }}
        run: |
          ssh -i ~/.ssh/aliyun_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/aliyun_deploy_key -p $SSH_PORT" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.db' \
            --exclude '*.sqlite' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Build and restart on server
        env:
          SSH_USER: ${{ secrets.ALIYUN_USER }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH || '/home/dfy/workspace/projects/websites/mindflow' }}
        run: |
          ssh -i ~/.ssh/aliyun_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' PNPM_VERSION='${PNPM_VERSION}' PM2_APP_NAME='${PM2_APP_NAME}' APP_PORT='${APP_PORT}' APP_HOST='${APP_HOST}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          corepack enable
          corepack prepare pnpm@"$PNPM_VERSION" --activate
          NODE_ENV=development pnpm install --frozen-lockfile --prod=false
          pnpm exec prisma generate
          pnpm build
          if pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1; then
            PORT="$APP_PORT" HOSTNAME="$APP_HOST" pm2 restart "$PM2_APP_NAME" --update-env
          else
            PORT="$APP_PORT" HOSTNAME="$APP_HOST" pm2 start "corepack pnpm@$PNPM_VERSION start" --name "$PM2_APP_NAME"
          fi
          curl --fail --silent --show-error "http://$APP_HOST:$APP_PORT" >/dev/null
          pm2 save
          EOF
