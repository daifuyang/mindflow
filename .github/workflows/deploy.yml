name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_KEY }}
          envs: ECS_PATH
          script: |
            set -e
            cd ${{ secrets.ECS_DEPLOY_PATH }}

            # Pull latest code
            git fetch origin
            git pull origin main

            # Stop existing PM2 process
            pm2 stop mindflow || true
            pm2 delete mindflow || true

            # Install dependencies using npm
            npm install
            npx prisma generate
            npx next build

            # Start PM2
            pm2 start ecosystem.config.cjs
            pm2 save

            # Check status
            pm2 status
