server {
    listen 443 ssl;
    server_name mindflow.zerocmf.com;

    ssl_certificate /etc/letsencrypt/live/mindflow.zerocmf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindflow.zerocmf.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    set $root /usr/local/workspace/www/mindflow.zerocmf.com;
    root $root;

    index index.html;

    # Next.js static export 配置
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Let's Encrypt 证书验证
    location /.well-known {
        root /usr/local/workspace/www;
    }
}

# HTTP转HTTPS
server {
    listen 80;
    server_name mindflow.zerocmf.com;
    return 301 https://$host$request_uri;
}
